# Magpie uses pyproject.toml only for pytest configuration. The plugin itself
# is not a pip-installable package — its scripts are invoked directly by skills.
[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
markers = [
    "spacy: model-gated pii_sweep integration tests that load en_core_web_lg (select with -k spacy)",
    "docling: model-gated docling integration; select with -k docling",
    "xray: tests that import x-ray / PyMuPDF (box-over-text detection); select with -k xray",
    "tsa: tests that hit a live RFC 3161 Time-Stamp Authority over the network (select with -m tsa)",
    "mcp: served-DB smoke that launches uvx mcp-sqlite (skipped if uvx absent)",
    "gliner: model-gated GLiNER/GLiREL integration that loads real weights (Track B entity-extract); select with -m gliner",
    "ftm: followthemoney/nomenklatura FtM-contract tests (Track B; Linux/CI only, skip when followthemoney absent); select with -m ftm",
    "neo4j: Neo4j graph-writer tests that need a live Neo4j (service container; Track B Phase 13a); select with -m neo4j",
    "compose: docker-compose graph-profile smoke -- config + up + Bolt connect (Track B Phase 13a); select with -m compose",
    "yente: live yente + OpenSearch cross-ref tests (Track B Phase 13b; need the crossref compose up); select with -m yente",
]
