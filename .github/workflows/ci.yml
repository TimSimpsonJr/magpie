name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      heavy:
        description: "Run the heavy (docling/spacy/xray) suite"
        type: boolean
        default: false
jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5      # puts uv + uvx on PATH for the mcp-sqlite smoke
      - name: Create venv + install OFFLINE deps only (NO 2 GB stack)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -r requirements-offline.txt
      - name: detect_tier capability report (informational; never fails the job)
        run: . .venv/bin/activate && python scripts/detect_tier.py --json || true
      - name: Offline suite + smoke (mcp-sqlite smoke runs -- uvx is on PATH)
        run: |
          . .venv/bin/activate
          python -m pytest -m "not docling and not spacy and not xray and not tsa and not gliner and not ftm and not neo4j and not compose" -q
  heavy:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.heavy }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Create venv + install ALL deps (~2 GB models on first run)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -r requirements-dev.txt  # full stack incl. en_core_web_lg (pinned by URL)
      - name: Heavy suite (docling/spacy/xray/gliner)
        run: |
          . .venv/bin/activate
          python -m pytest -m "docling or spacy or xray or gliner" -q
  ftm:
    # Track B (Phase 12) FtM-contract job. followthemoney/nomenklatura are
    # Linux-only (PyICU has no Windows wheel), so these tests SKIP on the Windows
    # dev box and run here continuously on push/PR to guard the Phase-13 hand-off
    # contract (design section 8). Not the 2 GB model stack -- just the FtM stack.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: System deps for PyICU (followthemoney -> normality -> PyICU)
        run: sudo apt-get update && sudo apt-get install -y libicu-dev pkg-config
      - name: Create venv + install the offline base + the FtM stack
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -r requirements-offline.txt -r requirements-ftm.txt
      - name: FtM contract tests (intermediate -> FtM bundle, export-cypher/neo4j-bulk, nomenklatura xref)
        run: |
          . .venv/bin/activate
          python -m pytest -m ftm -q
  # Phase-12 lesson, restated: the FtM + graph code is invisible on the Windows
  # dev box, so the `ftm` + `graph` + `compose` jobs are the ONLY real verification
  # surface -- gate the PR merge on all three, never on Windows-green alone.
  graph:
    # Track B (Phase 13a) Neo4j writer job. The neo4j driver is cross-platform (so
    # entity_graph_neo4j imports on Windows), but the writer tests need a LIVE Neo4j
    # -- they SKIP on the dev box and run here against a service container. Verifies
    # the single-property scoped_id constraint + the investigation-scoped REPLACE:
    # idempotence, in-scope orphan deletion, and the D4 cross-investigation isolation.
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.26.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 40s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Create venv + install the offline base + the graph driver
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -r requirements-offline.txt -r requirements-graph.txt
      - name: Neo4j writer tests (scoped REPLACE) against the service container
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
        run: |
          . .venv/bin/activate
          python -m pytest -m neo4j -q
  compose:
    # Track B (Phase 13a) compose smoke. Brings the SHIPPED graph-profile compose
    # UP and connects through it over Bolt -- verifies the profile/env/ports/
    # healthcheck wiring an operator actually runs, not just the YAML syntax.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Create venv + install the offline base + the graph driver
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          python -m pip install -r requirements-offline.txt -r requirements-graph.txt
      - name: Validate the compose config
        env: { NEO4J_PASSWORD: testpassword }
        run: docker compose -f infra/docker-compose.yml --profile graph config
      - name: Bring the graph profile up (wait for the healthcheck)
        env: { NEO4J_PASSWORD: testpassword }
        run: docker compose -f infra/docker-compose.yml --profile graph up -d --wait
      - name: Compose Bolt-connect smoke (-m compose; the DB is healthy via --wait, so it RUNS, not skips)
        env:
          NEO4J_URI: bolt://127.0.0.1:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
        run: |
          . .venv/bin/activate
          python -m pytest -m compose -rs -q
      - name: Tear down
        if: always()
        # `down` still interpolates the compose file's ${NEO4J_PASSWORD:?...}, so
        # this step needs the var too (each step's env is isolated in Actions).
        env: { NEO4J_PASSWORD: testpassword }
        run: docker compose -f infra/docker-compose.yml --profile graph down -v
