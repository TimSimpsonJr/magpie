# TEMPLATE -- the live manifest is rendered by entity_yente_dataset.render_manifest
# into data/magpie_corpus/manifest.yml with a content-hash version; this file
# documents the OPT-IN watchlist shape, it is NOT mounted by the compose.
# Watchlist data is the OpenSanctions 'default' catalog -- CC-BY-NC (NON-COMMERCIAL);
# enabling it is a deliberate, documented choice.
catalogs:
  - url: "https://data.opensanctions.org/datasets/latest/default/catalog.json"
    scope: default
    resource_name: entities.ftm.json
datasets:
  - name: magpie_corpus
    title: "Magpie FOIA corpus (own-corpus)"
    path: /data/entities.ftm.json
    version: "seed"
    namespace: true
